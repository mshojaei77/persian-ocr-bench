# Persian OCR Benchmark — Model Registry Reference
#
# This file documents all 26 models. The authoritative source of truth
# is ``src/persian_ocr/registry.py`` (the ``MODELS`` dict).
#
# Priority is defined in the ``PRIORITY`` list in ``registry.py``.

models:
