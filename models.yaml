  parameter_display: not comparable; fas.traineddata is a small language pack
  parameter_confidence: not_comparable
  persian_support:
    status: explicit_model
    codes:
    - fas
    evidence: Official Tesseract traineddata repositories provide fas.traineddata for Farsi/Persian.
  multilingual_scope: One language pack at a time; combine packs for mixed-language OCR.
  outputs:
  - plain_text
  - TSV
  - hOCR
  - PDF
  - word_boxes
  - confidence
  recommended_tracks:
  - raw_recognition
  - normalized_recognition
  - operations
  inference:
    backend: tesseract CLI or pytesseract
    device: CPU
    colab_fit: easy
    important_settings:
    - pin the Tesseract version
    - record OEM and PSM
    - test fas and fas+eng for mixed pages
  license:
    code: Apache-2.0
    weights: traineddata license follows official repository
  links:
    huggingface: null
    github: https://github.com/tesseract-ocr/tesseract
    weights: https://github.com/tesseract-ocr/tessdata_best/blob/main/fas.traineddata
