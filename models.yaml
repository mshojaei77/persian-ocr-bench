# Benchmark catalog for the Colab workflow in COLAB_GUIDE.md.
# Sorted by approximate model size. Traditional engines have no comparable
# parameter count, so they are listed first as lightweight baselines.
# Links were checked against the model/project pages on 2026-07-11.

models:
  - id: tesseract_fas
    name: Tesseract Persian
    size: lightweight
    parameters: null
    category: traditional_ocr
    languages: [fas]
    huggingface: https://huggingface.co/collections/tesseract
    github: https://github.com/tesseract-ocr/tesseract
    notes: Install tesseract-ocr-fas in Colab; strong baseline for clean print.

  - id: easyocr_fa
    name: EasyOCR Persian
    size: lightweight
    parameters: null
    category: traditional_ocr
    languages: [fa]
    huggingface: https://huggingface.co/models?search=easyocr%20persian
    github: https://github.com/JaidedAI/EasyOCR
    notes: Simple GPU baseline; verify Persian model availability in the runtime.

  - id: kraken_fas
    name: Kraken Persian
    size: lightweight
    parameters: null
    category: traditional_ocr
    languages: [fas]
    huggingface: https://huggingface.co/models?search=kraken%20persian%20ocr
    github: https://github.com/mittagessen/kraken
    notes: Useful when a compatible Persian recognition model is supplied.

  - id: ppocrv5_fa
    name: PaddleOCR PP-OCRv5 Persian
    size: small
    parameters: null
    category: traditional_ocr
    languages: [fa]
    huggingface: https://huggingface.co/models?search=PP-OCRv5%20Persian
    github: https://github.com/PaddlePaddle/PaddleOCR
