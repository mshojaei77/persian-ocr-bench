# Persian and multilingual OCR benchmark catalog.
# Updated and source-audited on 2026-07-13.
#
# IMPORTANT:
# - Official multilingual claims are not treated as proof of Persian support.
# - Classical OCR pipelines are listed before VLMs because their parameter counts
#   are not directly comparable.
# - Document parsing and raw character recognition must be scored separately.
# - URLs under `links` point to official or model-author resources whenever available.

catalog:
  title: Persian and Multilingual OCR Benchmark Model Catalog
  version: 3
  updated_at: '2026-07-13'
  scope: Open-weight OCR engines, OCR-specialized VLMs, and a small number of general VLM controls relevant to Persian
    (fa/fas) text extraction.
  objective: Choose the strongest model for Persian character recognition, RTL reading order, and structured document
    reconstruction rather than relying on English/Chinese aggregate scores.
  ordering:
  - Classical and line-recognition baselines are first because their parameter counts are not directly comparable
    with VLMs.
  - Neural document models are then sorted by approximate total parameter count, smallest to largest.
  - For equal sizes, models with stronger Persian evidence and higher benchmark priority appear first.
  parameter_policy:
    exact: Official model card or repository states the total parameter count.
    approximate: Official materials state a rounded size or only a backbone/model class; use for ordering, not memory
      prediction.
    not_comparable: Classical OCR engine or multi-model pipeline without one meaningful total parameter count.
    base_model_only: Community adapter/fine-tune inherits the listed base-model size; trainable adapter size may
      be much smaller.
  priority_levels:
    P0: Phase 1 screening candidate; capped at a diverse first wave rather than a final-benchmark commitment.
    P1: Hold for a second screening wave when P0 leaves a capability gap.
    P2: Optional diagnostic candidate; weaker Persian evidence, redundant architecture, or higher operating cost.
    EXCLUDE: Do not include in the main quality leaderboard; reason is recorded below.
  persian_support_status:
    explicit_model: The exact checkpoint/model card officially names Persian/Farsi/fa/fas or publishes a Persian
      score.
    explicit_family: The official model family or OCR runtime lists Persian, but the exact checkpoint does not publish
      a Persian-specific result.
    community_targeted: A community checkpoint is specifically trained for Persian; evidence is not an official
      upstream claim.
    broad_multilingual_no_fa: Officially multilingual, but Persian is not specifically named.
    not_listed: The official supported-language list does not include Persian.
    unknown: No reliable language list was found.
execution_registry:
  schema: persian_ocr_execution_registry_v2
  default_status: catalog_only
  status_values:
    catalog_only: Catalog metadata exists, but no local adapter is available.
    adapter_ready: A local CLI adapter exists and still needs a full benchmark artifact.
    benchmarked: A local CLI adapter and benchmark artifact both exist.
    blocked: Implementation was attempted and the blocking reason is recorded in the model entry.
    rejected: A smoke run showed that the model is not suitable for the declared benchmark track.
  entrypoint_pattern: 'src/{id}.py'
  artifact_pattern: 'bench_runs/smoke20-v1/{id}.json'
  dependency_policy: Keep model-specific heavyweight runtimes in named optional dependency groups.
  selection_policy:
  - Finish adapter_ready models before starting a catalog_only model.
  - Within the same status, prefer P0, then P1, then P2.
  - Use catalog rank only as the final tie-breaker; it is not a quality leaderboard rank.
benchmark_protocol:
  phase1_screening:
    dataset_id: smoke20-v1
    purpose: Eliminate nonfunctional or clearly unsuitable systems before building the sealed large benchmark.
    decisions:
    - Advance
    - Hold
    - Reject
    - Blocked
    ranking_policy: Never assign numeric ranks or declare a winner from the 20-image screening set.
    completeness_policy: All selected images remain in coverage and failure-rate accounting; failed pages are never dropped from eligibility.
    comparison_classes:
    - full_page_detector_recognizer
    - component_recognizer
    - document_ocr_vlm
  large_benchmark:
    dataset_id: null
    status: planned_after_phase1_shortlist
    ranking_policy: Compare only complete artifacts with identical protocol, dataset, scorer, and eligible capability class identities.
  leaderboards:
  - name: raw_recognition
    metrics:
    - CER_raw
    - WER_raw
    - exact_line_accuracy
    note: Score before Unicode or Persian/Arabic character normalization.
  - name: normalized_recognition
    metrics:
    - CER_normalized
    - WER_normalized
    normalization:
    - Unicode NFC
    - Arabic ي to Persian ی
    - Arabic ك to Persian ک
    - optional digit normalization reported separately
    - whitespace normalization
  - name: persian_failure_slices
    metrics:
    - Persian_yeh_accuracy
    - Persian_kaf_accuracy
    - ZWNJ_accuracy
    - RTL_reading_order_error
    - mixed_fa_en_order_error
    - Persian_vs_Arabic_digit_accuracy
    - diacritic_accuracy_when_present
  - name: document_structure
    metrics:
    - reading_order
    - layout_element_F1
    - table_TEDS
    - formula_CDM
    - markdown_edit_distance
    note: Do not combine this score with character recognition; report both leaderboards.
  - name: operations
    metrics:
    - pages_per_second
    - peak_VRAM_GB
    - cold_start_seconds
    - failure_rate
    - output_tokens_per_page
    note: Measure on identical hardware, image resolution, precision, and batch/concurrency settings.
  required_document_slices:
  - clean digital Persian print
  - low-resolution and compressed scans
  - phone photos with skew, glare, shadows, and curved pages
  - multi-column RTL pages
  - mixed Persian-English text
  - tables and forms
  - Persian handwriting
  - historical fonts and degraded print
  - math/formulas embedded in Persian text
