environments:
  traditional:
    deps: [easyocr, pytesseract, hezar, kraken]
    notes: "Also needs tesseract-ocr system package"

  transformers:
    deps: [transformers>=4.55.0, accelerate>=1.14.0, bitsandbytes>=0.49.2, peft>=0.19.1, qwen-vl-utils, safetensors]

  deepseek:
    deps: [transformers>=4.55.0, accelerate>=1.14.0]
    notes: "vLLM 0.8.5 + flash-attn 2.7.0 recommended; Python 3.12.9 + CUDA 11.8 + PyTorch 2.6"

  surya:
    deps: [surya-ocr>=0.21.1]
    notes: "Requires Docker (vllm) or llama-server (llamacpp)"

  chandra:
    deps: [surya-ocr>=0.21.1]
    notes: "Shares Surya infrastructure"

  gguf:
    deps: [llama-cpp-python>=0.3.0]
    notes: "Requires llama-server binary"
